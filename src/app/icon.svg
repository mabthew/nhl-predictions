<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="ice" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e3a5f"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="url(#ice)"/>
  <!-- Hockey puck -->
  <ellipse cx="16" cy="20" rx="9" ry="4" fill="#1a1a1a" stroke="#444" stroke-width="0.5"/>
  <ellipse cx="16" cy="19" rx="9" ry="4" fill="#2a2a2a"/>
  <ellipse cx="16" cy="18.5" rx="9" ry="4" fill="#333"/>
  <!-- Puck highlight -->
  <ellipse cx="14" cy="17.8" rx="5" ry="2" fill="#444" opacity="0.4"/>
  <!-- Hockey stick -->
  <line x1="6" y1="6" x2="20" y2="22" stroke="#e8a840" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M20 22 Q22 24 26 23" stroke="#e8a840" stroke-width="3" stroke-linecap="round" fill="none"/>
  <!-- Stick tape -->
  <line x1="6" y1="6" x2="9" y2="9.5" stroke="#f0f0f0" stroke-width="2.8" stroke-linecap="round"/>
  <!-- Sparkle for "predictions" feel -->
  <circle cx="8" cy="5" r="1" fill="#60a5fa" opacity="0.9"/>
  <circle cx="26" cy="8" r="1.5" fill="#60a5fa" opacity="0.7"/>
  <circle cx="24" cy="12" r="0.8" fill="#93c5fd" opacity="0.6"/>
</svg>
